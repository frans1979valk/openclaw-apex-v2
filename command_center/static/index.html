<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;padding:16px;max-width:1200px;margin:0 auto}
h1{font-size:1.3em;color:#58a6ff;margin-bottom:4px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #21262d}
.top-bar .user{color:#8b949e;font-size:0.85em}
.top-bar button{background:none;border:1px solid #30363d;color:#8b949e;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8em}
.top-bar button:hover{border-color:#58a6ff;color:#58a6ff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h2{font-size:1em;color:#58a6ff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card.full{grid-column:1/-1}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75em;font-weight:600}
.badge.green{background:#238636;color:#fff}
.badge.red{background:#da3633;color:#fff}
.badge.yellow{background:#9e6a03;color:#fff}
.badge.blue{background:#1f6feb;color:#fff}
.badge.gray{background:#21262d;color:#8b949e}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d;font-size:0.9em}
.kv:last-child{border-bottom:none}
.kv .k{color:#8b949e}
.kv .v{font-weight:600}
table{width:100%;border-collapse:collapse;font-size:0.85em}
th{text-align:left;padding:8px 6px;border-bottom:1px solid #30363d;color:#8b949e;font-weight:500}
td{padding:8px 6px;border-bottom:1px solid #21262d}
tr:hover{background:#1c2128}
.actions{display:flex;gap:6px}
.btn{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:0.8em;font-weight:600}
.btn-confirm{background:#238636;color:#fff}
.btn-confirm:hover{background:#2ea043}
.btn-reject{background:#21262d;color:#f85149;border:1px solid #30363d}
.btn-reject:hover{background:#30363d}
.btn-action{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:0.85em}
.btn-action:hover{border-color:#58a6ff;color:#58a6ff}
.btn-danger{border-color:#da3633;color:#da3633}
.btn-danger:hover{background:#da3633;color:#fff}
.otp-input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;width:80px;font-size:0.85em;text-align:center}
.risk-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.log-line{font-family:monospace;font-size:0.8em;padding:3px 0;border-bottom:1px solid #0d1117;word-break:break-all}
.log-line.error{color:#f85149}
.log-line.warning{color:#d29922}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
select,input[type="text"]{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:0.85em}
.coins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.coin-card{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:10px;text-align:center}
.coin-card .sym{font-weight:700;font-size:1em}
.coin-card .signal{font-size:0.8em;margin-top:4px}
.coin-card .score{font-size:0.75em;color:#8b949e;margin-top:2px}
.refresh-note{color:#484f58;font-size:0.7em;float:right}
.empty{color:#484f58;font-style:italic;padding:12px 0}
#oracle-result{max-height:300px;overflow-y:auto;font-size:0.85em;background:#0d1117;padding:10px;border-radius:6px;margin-top:10px;white-space:pre-wrap;display:none}
</style>
</head>
<body>

<div class="top-bar">
  <div><h1>Command Center</h1><span class="user" id="userInfo"></span></div>
  <button onclick="logout()">Uitloggen</button>
</div>

<div class="grid">

  <!-- STATUS -->
  <div class="card" id="statusCard">
    <h2>Status <span class="refresh-note" id="statusTime"></span></h2>
    <div id="statusContent"><span class="empty">Laden...</span></div>
  </div>

  <!-- BALANCE -->
  <div class="card" id="balanceCard">
    <h2>Account</h2>
    <div id="balanceContent"><span class="empty">Laden...</span></div>
  </div>

  <!-- PROPOSALS -->
  <div class="card full" id="proposalsCard">
    <h2>Proposals</h2>
    <div id="proposalsContent"><span class="empty">Laden...</span></div>
  </div>

  <!-- BACKTEST -->
  <div class="card">
    <h2>Backtest</h2>
    <div class="controls">
      <input type="text" id="btSymbol" placeholder="BTCUSDT" value="BTCUSDT" style="width:120px">
      <select id="btInterval"><option value="1h">1h</option><option value="4h">4h</option><option value="1d">1d</option></select>
      <select id="btMonths"><option value="3">3 mnd</option><option value="6" selected>6 mnd</option><option value="12">12 mnd</option></select>
      <button class="btn-action" onclick="runBacktest()">Start</button>
    </div>
    <div id="backtestResult"><span class="empty">Selecteer parameters en klik Start</span></div>
  </div>

  <!-- ORACLE -->
  <div class="card">
    <h2>Market Oracle</h2>
    <button class="btn-action" onclick="runOracle()">Marktscan uitvoeren</button>
    <div id="oracle-result"></div>
  </div>

  <!-- LOGS -->
  <div class="card full">
    <h2>Audit Logs</h2>
    <div class="controls">
      <select id="logLevel" onchange="loadLogs()">
        <option value="">Alle levels</option>
        <option value="ERROR">ERROR</option>
        <option value="WARNING">WARNING</option>
        <option value="confirm">Confirms</option>
        <option value="login">Logins</option>
      </select>
      <button class="btn-action" onclick="loadLogs()">Vernieuwen</button>
      <span class="refresh-note">Auto-refresh elke 30s</span>
    </div>
    <div id="logsContent" style="max-height:250px;overflow-y:auto;margin-top:8px"><span class="empty">Laden...</span></div>
  </div>

  <!-- TRADING CONTROLS -->
  <div class="card full">
    <h2>Trading Controls</h2>
    <div class="controls">
      <button class="btn-action" onclick="pauseTrading()">Pauzeer 30 min</button>
      <button class="btn-action btn-danger" onclick="resumeTrading()">Resume Trading</button>
    </div>
    <div id="controlResult" style="font-size:0.85em;color:#8b949e;margin-top:8px"></div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('cc_token');
const EXPIRES = localStorage.getItem('cc_expires');

// Auth check
if (!TOKEN || !EXPIRES || new Date(EXPIRES) < new Date()) {
  localStorage.removeItem('cc_token');
  localStorage.removeItem('cc_expires');
  window.location.href = '/';
}

function headers() { return { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' }; }

async function api(method, path, body) {
  const opts = { method, headers: headers() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { logout(); return null; }
  return r;
}

function signalBadge(sig) {
  const map = {PERFECT_DAY:'green',BREAKOUT_BULL:'green',MOMENTUM:'blue',BUY:'green',SELL:'red',DANGER:'red',HOLD:'gray'};
  return `<span class="badge ${map[sig]||'gray'}">${sig}</span>`;
}

// ── Status ──
async function loadStatus() {
  try {
    const r = await api('GET', '/cc/status');
    if (!r) return;
    const d = await r.json();
    let html = '';
    const paused = d.trading?.paused_until;
    const halted = d.trading?.halted;
    html += `<div class="kv"><span class="k">Mode</span><span class="v"><span class="badge blue">${d.mode || 'demo'}</span></span></div>`;
    html += `<div class="kv"><span class="k">Trading</span><span class="v">${halted ? '<span class="badge red">HALTED</span>' : paused ? '<span class="badge yellow">PAUSED</span>' : '<span class="badge green">ACTIVE</span>'}</span></div>`;
    if (paused) html += `<div class="kv"><span class="k">Paused until</span><span class="v">${new Date(paused).toLocaleTimeString()}</span></div>`;
    html += `<div class="kv"><span class="k">Win Rate</span><span class="v">${d.overall_win_rate != null ? d.overall_win_rate.toFixed(1)+'%' : '—'}</span></div>`;
    html += `<div class="kv"><span class="k">Crash Score (24h max)</span><span class="v">${d.crash_max_24h || 0}</span></div>`;
    html += `<div class="kv"><span class="k">Applies vandaag</span><span class="v">${d.applies_today || 0} / ${d.max_applies_per_day || 3}</span></div>`;
    html += `<div class="kv"><span class="k">Allow Live</span><span class="v"><span class="badge ${d.allow_live?'red':'green'}">${d.allow_live?'JA':'NEE'}</span></span></div>`;
    if (d.risk_flags && d.risk_flags.length > 0) {
      html += '<div class="risk-flags">';
      d.risk_flags.forEach(f => html += `<span class="badge red">${f}</span>`);
      html += '</div>';
    }
    // Coins
    if (d.last_signals && Object.keys(d.last_signals).length > 0) {
      html += '<div style="margin-top:12px"><div class="coins-grid">';
      for (const [coin, sig] of Object.entries(d.last_signals)) {
        html += `<div class="coin-card"><div class="sym">${coin}</div><div class="signal">${signalBadge(sig)}</div></div>`;
      }
      html += '</div></div>';
    }
    document.getElementById('statusContent').innerHTML = html;
    document.getElementById('statusTime').textContent = new Date().toLocaleTimeString();
  } catch(e) { document.getElementById('statusContent').innerHTML = '<span class="empty">Fout bij laden</span>'; }
}

// ── Balance ──
async function loadBalance() {
  try {
    const r = await api('GET', '/cc/balance');
    if (!r) return;
    const d = await r.json();
    let html = '';
    html += `<div class="kv"><span class="k">Balans</span><span class="v">$${(d.balance || 0).toFixed(2)}</span></div>`;
    html += `<div class="kv"><span class="k">Start</span><span class="v">$${(d.demo_start_usdt || 1000).toFixed(2)}</span></div>`;
    const pnl = d.pnl_total_usdt || 0;
    html += `<div class="kv"><span class="k">P&L</span><span class="v" style="color:${pnl>=0?'#3fb950':'#f85149'}">$${pnl.toFixed(2)} (${(d.pnl_total_pct||0).toFixed(1)}%)</span></div>`;
    html += `<div class="kv"><span class="k">Win Rate</span><span class="v">${(d.win_rate_pct||0).toFixed(1)}%</span></div>`;
    html += `<div class="kv"><span class="k">Orders</span><span class="v">${d.total_orders || 0}</span></div>`;
    html += `<div class="kv"><span class="k">Peak</span><span class="v">$${(d.peak_balance || 0).toFixed(2)}</span></div>`;
    document.getElementById('balanceContent').innerHTML = html;
  } catch(e) { document.getElementById('balanceContent').innerHTML = '<span class="empty">Fout bij laden</span>'; }
}

// ── Proposals ──
async function loadProposals() {
  try {
    const r = await api('GET', '/cc/proposals?state=pending');
    if (!r) return;
    const data = await r.json();
    const proposals = Array.isArray(data) ? data : (data.proposals || []);
    if (proposals.length === 0) {
      document.getElementById('proposalsContent').innerHTML = '<span class="empty">Geen openstaande proposals</span>';
      return;
    }
    let html = '<table><tr><th>ID</th><th>Type</th><th>Reden</th><th>Door</th><th>Tijd</th><th>Acties</th></tr>';
    proposals.forEach(p => {
      html += `<tr>
        <td><code>${p.id}</code></td>
        <td>${signalBadge(p.type)}</td>
        <td>${p.reason || '—'}</td>
        <td>${p.requested_by || '—'}</td>
        <td>${p.ts ? new Date(p.ts).toLocaleTimeString() : '—'}</td>
        <td class="actions">
          <input type="text" class="otp-input" id="otp-${p.id}" placeholder="OTP">
          <button class="btn btn-confirm" onclick="confirmProposal('${p.id}')">Confirm</button>
          <button class="btn btn-reject" onclick="rejectProposal('${p.id}')">Reject</button>
        </td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('proposalsContent').innerHTML = html;
  } catch(e) { document.getElementById('proposalsContent').innerHTML = '<span class="empty">Fout bij laden</span>'; }
}

async function confirmProposal(id) {
  const otp = document.getElementById('otp-' + id).value.trim();
  if (!otp) { alert('Vul OTP code in'); return; }
  const r = await fetch('/cc/proposals/' + id + '/confirm', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'X-OTP': otp, 'Content-Type': 'application/json' }
  });
  const d = await r.json();
  if (r.ok) { alert('Proposal bevestigd!'); loadProposals(); loadStatus(); }
  else { alert('Fout: ' + (d.detail || JSON.stringify(d))); }
}

async function rejectProposal(id) {
  if (!confirm('Proposal ' + id + ' afwijzen?')) return;
  const r = await api('POST', '/cc/proposals/' + id + '/reject', {reason: 'Afgewezen via Command Center'});
  if (r && r.ok) { alert('Proposal afgewezen'); loadProposals(); }
}

// ── Backtest ──
async function runBacktest() {
  const sym = document.getElementById('btSymbol').value.trim() || 'BTCUSDT';
  const intv = document.getElementById('btInterval').value;
  const months = document.getElementById('btMonths').value;
  document.getElementById('backtestResult').innerHTML = '<span class="empty">Laden...</span>';
  try {
    const r = await api('GET', `/cc/backtest/${sym}?interval=${intv}&months=${months}`);
    if (!r) return;
    const d = await r.json();
    let html = '<table><tr><th>Signaal</th><th>Count</th><th>Win Rate</th><th>Avg P&L 1h</th><th>Avg P&L 4h</th></tr>';
    const signals = d.signals_by_type || d.by_signal || [];
    if (Array.isArray(signals)) {
      signals.forEach(s => {
        html += `<tr><td>${signalBadge(s.signal||s.type||'?')}</td><td>${s.count||0}</td><td>${(s.win_rate||0).toFixed(1)}%</td><td>${(s.avg_pnl_1h||0).toFixed(2)}%</td><td>${(s.avg_pnl_4h||0).toFixed(2)}%</td></tr>`;
      });
    }
    html += '</table>';
    if (d.overall) html += `<div style="margin-top:8px;font-size:0.85em;color:#8b949e">Overall: win_rate=${(d.overall.win_rate||0).toFixed(1)}% | profit_factor=${(d.overall.profit_factor||0).toFixed(2)} | trades=${d.overall.total_trades||0}</div>`;
    document.getElementById('backtestResult').innerHTML = html;
  } catch(e) { document.getElementById('backtestResult').innerHTML = '<span class="empty">Fout</span>'; }
}

// ── Oracle ──
async function runOracle() {
  const el = document.getElementById('oracle-result');
  el.style.display = 'block';
  el.textContent = 'Marktscan bezig...';
  try {
    const r = await api('GET', '/cc/oracle');
    if (!r) return;
    const d = await r.json();
    el.textContent = JSON.stringify(d, null, 2);
  } catch(e) { el.textContent = 'Fout: ' + e.message; }
}

// ── Logs ──
async function loadLogs() {
  const level = document.getElementById('logLevel').value;
  try {
    const r = await api('GET', `/cc/logs?level=${level}&limit=100`);
    if (!r) return;
    const d = await r.json();
    if (!d.lines || d.lines.length === 0) {
      document.getElementById('logsContent').innerHTML = '<span class="empty">Geen logs</span>';
      return;
    }
    let html = '';
    d.lines.forEach(l => {
      let cls = '';
      if (l.includes('ERROR') || l.includes('denied')) cls = 'error';
      else if (l.includes('WARNING')) cls = 'warning';
      html += `<div class="log-line ${cls}">${escHtml(l)}</div>`;
    });
    document.getElementById('logsContent').innerHTML = html;
  } catch(e) { document.getElementById('logsContent').innerHTML = '<span class="empty">Fout</span>'; }
}

// ── Trading controls ──
async function pauseTrading() {
  const mins = prompt('Pauzeer voor hoeveel minuten?', '30');
  if (!mins) return;
  const r = await api('POST', '/cc/pause', {minutes: parseInt(mins), reason: 'Handmatige pause via Command Center'});
  if (r && r.ok) {
    document.getElementById('controlResult').textContent = `Trading gepauzeerd voor ${mins} minuten`;
    loadStatus();
  }
}

async function resumeTrading() {
  if (!confirm('Trading hervatten?')) return;
  const r = await api('POST', '/cc/resume');
  if (r && r.ok) {
    document.getElementById('controlResult').textContent = 'Trading hervat';
    loadStatus();
  }
}

function logout() {
  api('POST', '/cc/auth/logout');
  localStorage.removeItem('cc_token');
  localStorage.removeItem('cc_expires');
  window.location.href = '/';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Init ──
document.getElementById('userInfo').textContent = localStorage.getItem('cc_email') || '';
loadStatus();
loadBalance();
loadProposals();
loadLogs();

// Auto-refresh
setInterval(loadStatus, 15000);
setInterval(loadProposals, 15000);
setInterval(loadLogs, 30000);
setInterval(loadBalance, 60000);
</script>
</body>
</html>
