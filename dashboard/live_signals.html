<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Live Signalen — OpenClaw Apex</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, Arial, sans-serif; background: #0d1117; color: #e6edf3; }

  header {
    background: #161b22; padding: 14px 24px;
    border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 1.15rem; }
  .nav-back {
    font-size: .8rem; color: #58a6ff; text-decoration: none;
    border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px;
  }
  .nav-back:hover { border-color: #58a6ff; }
  #logout-btn {
    font-size: .75rem; color: #8b949e; background: none;
    border: 1px solid #30363d; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; margin-left: auto;
  }
  #logout-btn:hover { color: #f85149; border-color: #f85149; }

  /* Status bar */
  #status-bar {
    display: flex; flex-wrap: wrap; gap: 12px;
    padding: 14px 24px; background: #161b22;
    border-bottom: 1px solid #30363d; align-items: center;
  }
  .sbar-item {
    background: #0d1117; border: 1px solid #30363d;
    border-radius: 8px; padding: 8px 14px;
    text-align: center; min-width: 80px;
  }
  .sbar-val { font-size: 1.05rem; font-weight: 700; }
  .sbar-lbl { font-size: .62rem; color: #8b949e; margin-top: 2px; }
  .regime-bull { color: #3fb950; }
  .regime-bear { color: #f85149; }
  .regime-onbekend { color: #8b949e; }

  /* Filter bar */
  #filter-bar {
    padding: 10px 24px; background: #0d1117;
    border-bottom: 1px solid #21262d;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .filter-btn {
    background: #161b22; color: #8b949e; border: 1px solid #30363d;
    border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: .8rem;
    transition: all .15s;
  }
  .filter-btn:hover { background: #21262d; }
  .filter-btn.active { background: #1f4068; color: #58a6ff; border-color: #58a6ff; font-weight: 600; }
  #refresh-info { margin-left: auto; font-size: .72rem; color: #8b949e; }
  #refresh-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: .75rem;
  }
  #refresh-btn:hover { color: #58a6ff; border-color: #58a6ff; }

  /* Table */
  #main-wrap { padding: 20px 24px; }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  thead th {
    background: #161b22; color: #8b949e; padding: 9px 12px;
    text-align: left; font-weight: 500; white-space: nowrap;
    border-bottom: 2px solid #30363d; cursor: default;
  }
  tbody tr {
    border-bottom: 1px solid #21262d;
    transition: background .1s; cursor: pointer;
  }
  tbody tr:hover { background: #161b22; }
  tbody tr.has-signal { border-left: 3px solid #3fb950; }
  tbody tr.has-signal.verdict-sterk { border-left-color: #3fb950; }
  tbody tr.has-signal.verdict-toestaan { border-left-color: #58a6ff; }
  tbody tr.has-signal.verdict-zwak { border-left-color: #d29922; }
  tbody tr.no-signal { opacity: .6; border-left: 3px solid transparent; }
  td { padding: 9px 12px; white-space: nowrap; vertical-align: middle; }

  .coin-cell { font-weight: 600; font-size: .9rem; }
  .coin-cell a { color: #58a6ff; text-decoration: none; font-size: .65rem; margin-left: 4px; opacity: .8; }
  .coin-cell a:hover { opacity: 1; }
  .price-cell { font-family: monospace; color: #e6edf3; }
  .price-loading { color: #8b949e; font-style: italic; }

  /* RSI badge */
  .rsi-oversold  { color: #3fb950; font-weight: 600; }
  .rsi-neutral   { color: #e6edf3; }
  .rsi-overbought { color: #f85149; font-weight: 600; }
  .rsi-mid       { color: #d29922; }
  .rsi-zone-badge {
    font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    margin-left: 4px; font-weight: 500;
  }
  .rz-oversold  { background: rgba(63,185,80,.15); color: #3fb950; }
  .rz-neutral   { background: rgba(139,148,158,.1); color: #8b949e; }
  .rz-overbought { background: rgba(248,81,73,.15); color: #f85149; }

  /* MACD */
  .macd-bull { color: #3fb950; }
  .macd-bear { color: #f85149; }
  .macd-flat { color: #8b949e; }

  /* ADX */
  .adx-trend { color: #d29922; font-weight: 600; }
  .adx-range { color: #8b949e; }

  /* EMA */
  .ema-bull { color: #3fb950; }
  .ema-bear { color: #f85149; }

  /* Signal badge */
  .sig-badge {
    display: inline-block; font-size: .7rem; padding: 2px 7px;
    border-radius: 4px; font-weight: 600; white-space: nowrap;
  }
  .sig-breakout { background: rgba(63,185,80,.2); color: #3fb950; border: 1px solid #3fb950; }
  .sig-momentum { background: rgba(88,166,255,.2); color: #58a6ff; border: 1px solid #58a6ff; }
  .sig-buy      { background: rgba(210,153,34,.2); color: #d29922; border: 1px solid #d29922; }
  .sig-none     { color: #484f58; font-size: .72rem; }

  /* Verdict badge */
  .verdict-badge {
    display: inline-block; font-size: .7rem; font-weight: 700;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  }
  .vb-sterk    { background: rgba(63,185,80,.15); color: #3fb950; border: 1px solid rgba(63,185,80,.4); }
  .vb-toestaan { background: rgba(88,166,255,.15); color: #58a6ff; border: 1px solid rgba(88,166,255,.4); }
  .vb-zwak     { background: rgba(210,153,34,.15); color: #d29922; border: 1px solid rgba(210,153,34,.4); }
  .vb-skip     { background: rgba(248,81,73,.1);  color: #8b949e; border: 1px solid #30363d; }
  .vb-none     { color: #484f58; font-size: .72rem; }

  /* Score bar */
  .score-wrap { display: flex; align-items: center; gap: 6px; }
  .score-bar  { width: 60px; height: 5px; background: #21262d; border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; }

  /* Detail panel */
  #detail-panel {
    display: none; position: fixed; right: 0; top: 0; bottom: 0;
    width: 340px; background: #161b22; border-left: 1px solid #30363d;
    overflow-y: auto; z-index: 100; padding: 20px 20px 40px;
  }
  #detail-panel.show { display: block; }
  #detail-panel h2 { font-size: 1rem; margin-bottom: 4px; }
  #detail-panel .dp-close {
    position: absolute; top: 14px; right: 14px;
    background: none; border: none; color: #8b949e; cursor: pointer; font-size: 1.1rem;
  }
  #detail-panel .dp-close:hover { color: #f85149; }
  .dp-section { margin-top: 18px; }
  .dp-section h3 { font-size: .75rem; color: #8b949e; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .dp-row {
    display: flex; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid #21262d; font-size: .8rem;
  }
  .dp-row:last-child { border: none; }
  .dp-lbl { color: #8b949e; }
  .dp-verdict-bar {
    margin-top: 12px; padding: 10px 14px; border-radius: 6px;
    text-align: center; font-weight: 700; font-size: .9rem;
  }
  .dp-interp {
    margin-top: 10px; padding: 10px 12px; border-radius: 6px;
    font-size: .78rem; line-height: 1.5; background: rgba(255,255,255,.03);
    border: 1px solid #30363d;
  }

  .spinner {
    border: 3px solid #30363d; border-top-color: #58a6ff;
    border-radius: 50%; width: 32px; height: 32px;
    animation: spin .8s linear infinite;
    margin: 60px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-msg { color: #f85149; padding: 20px 24px; }
</style>
</head>
<body>

<header>
  <span>&#9889;</span>
  <h1>Live Signalen</h1>
  <a class="nav-back" href="setup_intelligence.html">&#8592; Setup Intel</a>
  <a class="nav-back" href="index.html">Dashboard</a>
  <button id="logout-btn" onclick="logout()">Uitloggen</button>
</header>

<div id="status-bar">
  <div class="sbar-item">
    <div class="sbar-val" id="sb-regime">...</div>
    <div class="sbar-lbl">BTC Regime</div>
  </div>
  <div class="sbar-item">
    <div class="sbar-val" id="sb-active" style="color:#3fb950">0</div>
    <div class="sbar-lbl">Actief signaal</div>
  </div>
  <div class="sbar-item">
    <div class="sbar-val" id="sb-sterk" style="color:#3fb950">0</div>
    <div class="sbar-lbl">STERK actief</div>
  </div>
  <div class="sbar-item">
    <div class="sbar-val" id="sb-total" style="color:#8b949e">0</div>
    <div class="sbar-lbl">Coins gemonitord</div>
  </div>
  <div style="margin-left:auto;font-size:.72rem;color:#8b949e" id="sb-ts"></div>
</div>

<div id="filter-bar">
  <span style="font-size:.75rem;color:#8b949e">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('')">Alles</button>
  <button class="filter-btn" onclick="setFilter('active')">Met signaal</button>
  <button class="filter-btn" onclick="setFilter('sterk')">STERK + TOESTAAN</button>
  <span id="refresh-info">Auto-refresh over <span id="countdown">60</span>s</span>
  <button id="refresh-btn" onclick="loadData()">&#8635; Nu vernieuwen</button>
</div>

<div id="main-wrap">
  <div class="spinner" id="spinner"></div>
  <div id="error-msg" style="display:none"></div>
  <table id="signals-table" style="display:none">
    <thead>
      <tr>
        <th>Coin</th>
        <th>Live prijs</th>
        <th>RSI (1h)</th>
        <th>MACD</th>
        <th>ADX</th>
        <th>EMA regime</th>
        <th>Signaal nu</th>
        <th>Verdict</th>
        <th>Score</th>
        <th>Win%</th>
        <th>Gem. +1h</th>
        <th>Data van</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div id="detail-panel">
  <button class="dp-close" onclick="closeDetail()">&#10005;</button>
  <div id="detail-content"></div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
(function() {
  const token = localStorage.getItem("oc_token");
  const exp   = localStorage.getItem("oc_expires");
  if (!token || !exp || new Date(exp) <= new Date()) {
    localStorage.removeItem("oc_token");
    window.location.href = "login.html";
  }
})();
const TOKEN = localStorage.getItem("oc_token") || "";
const H = {"X-API-KEY": TOKEN};
const API = ``;

function logout() {
  localStorage.removeItem("oc_token");
  localStorage.removeItem("oc_expires");
  window.location.href = "login.html";
}

// ── State ─────────────────────────────────────────────────────────────────────
let _data       = [];
let _filter     = "";
let _countdown  = 60;
let _timer      = null;
let _priceCache = {};

// ── Countdown timer ───────────────────────────────────────────────────────────
function startCountdown() {
  if (_timer) clearInterval(_timer);
  _countdown = 60;
  document.getElementById("countdown").textContent = _countdown;
  _timer = setInterval(() => {
    _countdown--;
    document.getElementById("countdown").textContent = Math.max(0, _countdown);
    if (_countdown <= 0) { clearInterval(_timer); loadData(); }
  }, 1000);
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(f) {
  _filter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderTable();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function rsiHtml(rsi, zone) {
  if (rsi == null) return "—";
  const cls = zone === "oversold" ? "rsi-oversold" : zone === "overbought" ? "rsi-overbought" : "rsi-neutral";
  const zcls = zone === "oversold" ? "rz-oversold" : zone === "overbought" ? "rz-overbought" : "rz-neutral";
  const zlbl = zone === "oversold" ? "oversold" : zone === "overbought" ? "overbought" : zone || "";
  return `<span class="${cls}">${rsi.toFixed(1)}</span><span class="rsi-zone-badge ${zcls}">${zlbl}</span>`;
}

function macdHtml(mh) {
  if (mh == null) return "—";
  if (mh > 5)    return `<span class="macd-bull">&#9650; bullish</span>`;
  if (mh < -5)   return `<span class="macd-bear">&#9660; bearish</span>`;
  return `<span class="macd-flat">&#9644; neutraal</span>`;
}

function adxHtml(adx) {
  if (adx == null) return "—";
  if (adx > 25) return `<span class="adx-trend">${adx.toFixed(0)} trend</span>`;
  return `<span class="adx-range">${adx.toFixed(0)} range</span>`;
}

function emaHtml(bull) {
  return bull
    ? `<span class="ema-bull">&#9650; bull</span>`
    : `<span class="ema-bear">&#9660; bear</span>`;
}

function signalHtml(sig) {
  if (!sig) return `<span class="sig-none">—</span>`;
  if (sig === "BREAKOUT_BULL") return `<span class="sig-badge sig-breakout">&#9660;BREAKOUT</span>`;
  if (sig === "MOMENTUM")      return `<span class="sig-badge sig-momentum">&#128200; MOMENTUM</span>`;
  return `<span class="sig-badge sig-buy">&#9650; BUY</span>`;
}

function verdictHtml(v) {
  if (!v) return `<span class="vb-none">—</span>`;
  const map = {
    "STERK":         "vb-sterk",
    "TOESTAAN":      "vb-toestaan",
    "TOESTAAN_ZWAK": "vb-zwak",
    "SKIP":          "vb-skip",
  };
  const label = v === "TOESTAAN_ZWAK" ? "ZWAK" : v;
  return `<span class="verdict-badge ${map[v] || 'vb-skip'}">${label}</span>`;
}

function scoreHtml(score, verdict) {
  if (score == null) return "—";
  const colors = { "STERK": "#3fb950", "TOESTAAN": "#58a6ff", "TOESTAAN_ZWAK": "#d29922", "SKIP": "#f85149" };
  const c = colors[verdict] || "#8b949e";
  return `<div class="score-wrap">
    <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${c}"></div></div>
    <span style="color:${c};font-size:.75rem">${score}</span>
  </div>`;
}

function pnlHtml(v) {
  if (v == null) return "—";
  const c = v > 0 ? "#3fb950" : v < 0 ? "#f85149" : "#8b949e";
  return `<span style="color:${c}">${v >= 0 ? "+" : ""}${v.toFixed(3)}%</span>`;
}

function tsHtml(ts_str) {
  if (!ts_str) return "—";
  try {
    const d = new Date(ts_str);
    const now = new Date();
    const diffH = Math.round((now - d) / 3600000);
    const lbl = diffH < 2 ? "recent" : diffH < 24 ? `${diffH}u oud` : `${Math.round(diffH/24)}d oud`;
    const c = diffH < 6 ? "#3fb950" : diffH < 24 ? "#d29922" : "#8b949e";
    return `<span style="color:${c};font-size:.72rem">${lbl}</span>`;
  } catch { return "—"; }
}

function getPriceDecimals(p) {
  if (!p) return 4;
  if (p >= 10000) return 1;
  if (p >= 100)   return 2;
  if (p >= 1)     return 4;
  return 6;
}

// ── Binance live prijs ophalen ────────────────────────────────────────────────
async function fetchPrices(symbols) {
  try {
    const r = await fetch(
      `https://api.binance.com/api/v3/ticker/price?symbols=${JSON.stringify(symbols)}`,
      { cache: "no-store" }
    );
    if (!r.ok) return;
    const arr = await r.json();
    arr.forEach(p => {
      _priceCache[p.symbol] = parseFloat(p.price);
    });
    // Update price cells in DOM
    document.querySelectorAll("[data-sym]").forEach(el => {
      const p = _priceCache[el.dataset.sym];
      if (p != null) {
        const dec = getPriceDecimals(p);
        el.textContent = `$${p.toLocaleString("en-US", {minimumFractionDigits: dec, maximumFractionDigits: dec})}`;
        el.classList.remove("price-loading");
      }
    });
  } catch(e) {}
}

// ── Tabel renderen ─────────────────────────────────────────────────────────────
function renderTable() {
  let rows = _data;
  if (_filter === "active")  rows = rows.filter(s => s.signal);
  if (_filter === "sterk")   rows = rows.filter(s => s.verdict === "STERK" || s.verdict === "TOESTAAN");

  const tbody = document.getElementById("table-body");
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="12" style="color:#8b949e;text-align:center;padding:30px">Geen signalen gevonden voor dit filter.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(s => {
    const hasSig   = !!s.signal;
    const rowCls   = hasSig
      ? `has-signal verdict-${(s.verdict || "").toLowerCase().replace("_zwak","").replace("toestaan","toestaan")}`
      : "no-signal";
    return `<tr class="${rowCls}" onclick="showDetail('${s.symbol}')">
      <td class="coin-cell">
        ${s.symbol.replace("USDT","")}
        <a href="chart.html?symbol=${s.symbol}&interval=1h" onclick="event.stopPropagation()" title="Open chart">&#128200;</a>
      </td>
      <td class="price-cell price-loading" data-sym="${s.symbol}">laden...</td>
      <td>${rsiHtml(s.rsi, s.rsi_zone)}</td>
      <td>${macdHtml(s.macd_hist)}</td>
      <td>${adxHtml(s.adx)}</td>
      <td>${emaHtml(s.ema_bull)}</td>
      <td>${signalHtml(s.signal)}</td>
      <td>${verdictHtml(s.verdict)}</td>
      <td>${scoreHtml(s.setup_score, s.verdict)}</td>
      <td>${s.win_pct_1h != null ? s.win_pct_1h.toFixed(1)+"%" : "—"}</td>
      <td>${pnlHtml(s.avg_1h)}</td>
      <td>${tsHtml(s.ts_str)}</td>
    </tr>`;
  }).join("");

  // Laad live prijzen
  const syms = rows.map(s => s.symbol);
  fetchPrices(syms);
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function showDetail(sym) {
  const s = _data.find(x => x.symbol === sym);
  if (!s) return;
  const panel = document.getElementById("detail-panel");
  const livePrice = _priceCache[sym];

  const verdictColors = { "STERK": "#3fb950", "TOESTAAN": "#58a6ff", "TOESTAAN_ZWAK": "#d29922", "SKIP": "#f85149" };
  const vc = verdictColors[s.verdict] || "#8b949e";
  const sigLabel = {"BREAKOUT_BULL": "BREAKOUT_BULL", "MOMENTUM": "MOMENTUM", "BUY": "BUY"}[s.signal] || "—";

  // Interpretatie tekst
  let interp = "";
  if (s.signal && s.verdict) {
    const kansKleur = (s.win_pct_1h || 0) >= 55 ? "#3fb950" : (s.win_pct_1h || 0) >= 45 ? "#d29922" : "#f85149";
    const pnlKleur  = (s.avg_1h || 0) >= 0.2 ? "#3fb950" : (s.avg_1h || 0) >= 0 ? "#d29922" : "#f85149";
    interp = `
      <div class="dp-interp">
        <b>Signaal: ${sigLabel}</b><br/>
        Historisch haalt dit signaal op ${s.symbol.replace("USDT","")}
        <span style="color:${kansKleur};font-weight:600">${(s.win_pct_1h||0).toFixed(1)}% winkans</span>
        met gemiddeld <span style="color:${pnlKleur};font-weight:600">${(s.avg_1h||0) >= 0 ? "+" : ""}${(s.avg_1h||0).toFixed(3)}%</span> na 1 uur
        (gebaseerd op ${s.n || "?"} historische trades).<br/><br/>
        ${s.verdict === "STERK" ? "<b style='color:#3fb950'>&#10003; Sterke setup</b> — dit is een van de beste setups in het systeem." :
          s.verdict === "TOESTAAN" ? "<b style='color:#58a6ff'>&#10003; Toegestaan</b> — solide setup, de bot mag hier actie op ondernemen." :
          s.verdict === "TOESTAAN_ZWAK" ? "<b style='color:#d29922'>&#9888; Zwak</b> — marginale setup, bot handelt hier niet op." :
          "<b style='color:#f85149'>&#10005; Skip</b> — negatieve verwachting, bot slaat dit over."}
      </div>`;
  } else if (!s.signal) {
    interp = `<div class="dp-interp" style="color:#8b949e">Geen actief signaal op dit moment.<br/>De bot monitort deze coin maar onderneemt nu geen actie.</div>`;
  }

  document.getElementById("detail-content").innerHTML = `
    <h2>${s.symbol.replace("USDT","")} <span style="color:#8b949e;font-weight:400;font-size:.85rem">/ USDT</span></h2>
    <div style="font-size:.72rem;color:#8b949e;margin-top:2px">
      Indicators van: ${s.ts_str ? new Date(s.ts_str).toLocaleString("nl-NL",{timeZone:"UTC"})+" UTC" : "—"}
    </div>
    ${s.signal ? `<div class="dp-verdict-bar" style="background:rgba(63,185,80,.1);border:1px solid ${vc};color:${vc};margin-top:12px">
      ${signalHtml(s.signal)} &nbsp; ${verdictHtml(s.verdict)} &nbsp; score ${s.setup_score || "—"}
    </div>` : ""}
    ${interp}

    <div class="dp-section">
      <h3>Actuele indicatoren (1h)</h3>
      <div class="dp-row"><span class="dp-lbl">Live prijs</span><span>${livePrice != null ? "$"+livePrice.toLocaleString("en-US",{maximumFractionDigits:getPriceDecimals(livePrice)}) : "laden..."}</span></div>
      <div class="dp-row"><span class="dp-lbl">RSI</span><span>${rsiHtml(s.rsi, s.rsi_zone)}</span></div>
      <div class="dp-row"><span class="dp-lbl">MACD histogram</span><span>${macdHtml(s.macd_hist)} (${s.macd_hist != null ? (s.macd_hist > 0 ? "+" : "") + s.macd_hist.toFixed(2) : "—"})</span></div>
      <div class="dp-row"><span class="dp-lbl">ADX</span><span>${adxHtml(s.adx)}</span></div>
      <div class="dp-row"><span class="dp-lbl">EMA regime</span><span>${emaHtml(s.ema_bull)}</span></div>
      <div class="dp-row"><span class="dp-lbl">BB positie</span><span style="color:#8b949e">${s.bb_position || "—"}</span></div>
      <div class="dp-row"><span class="dp-lbl">Volume ratio</span><span style="color:${(s.volume_ratio||0)>1.5?"#3fb950":"#8b949e"}">${s.volume_ratio != null ? s.volume_ratio.toFixed(2)+"x gem." : "—"}</span></div>
    </div>

    <div class="dp-section">
      <h3>Historische kwaliteit — ${s.signal || "geen signaal"}</h3>
      <div class="dp-row"><span class="dp-lbl">Verdict</span><span>${verdictHtml(s.verdict)}</span></div>
      <div class="dp-row"><span class="dp-lbl">Setup score</span><span>${scoreHtml(s.setup_score, s.verdict)}</span></div>
      <div class="dp-row"><span class="dp-lbl">Win% (1h)</span><span>${s.win_pct_1h != null ? s.win_pct_1h.toFixed(1)+"%" : "—"}</span></div>
      <div class="dp-row"><span class="dp-lbl">Gem. P&L (1h)</span><span>${pnlHtml(s.avg_1h)}</span></div>
      <div class="dp-row"><span class="dp-lbl">Aantal trades (n)</span><span>${s.n || "—"}</span></div>
      <div class="dp-row"><span class="dp-lbl">Edge strength</span><span style="color:#8b949e">${s.edge_strength || "—"}</span></div>
      <div class="dp-row"><span class="dp-lbl">Regime fit</span><span style="color:#8b949e">${s.regime_fit || "—"}</span></div>
    </div>

    <div style="margin-top:20px">
      <a href="chart.html?symbol=${s.symbol}&interval=1h"
         style="display:block;text-align:center;padding:8px;background:#1f4068;color:#58a6ff;text-decoration:none;border-radius:6px;font-size:.82rem;">
        &#128200; Open grafiek
      </a>
    </div>
  `;
  panel.classList.add("show");
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("show");
}

// ── Data laden ─────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById("spinner").style.display = "block";
  document.getElementById("signals-table").style.display = "none";
  document.getElementById("error-msg").style.display = "none";

  try {
    const r = await fetch(`${API}/live/signals`, { headers: H });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    _data = d.signals || [];

    // Status bar
    const regime = d.btc_regime || "onbekend";
    const rEl = document.getElementById("sb-regime");
    rEl.textContent = regime.toUpperCase();
    rEl.className = `sbar-val regime-${regime}`;
    document.getElementById("sb-active").textContent = d.n_active || 0;
    document.getElementById("sb-sterk").textContent  = d.n_sterk  || 0;
    document.getElementById("sb-total").textContent  = d.total    || 0;
    document.getElementById("sb-ts").textContent = "Bijgewerkt: " + new Date(d.ts).toLocaleTimeString("nl-NL");

    document.getElementById("spinner").style.display = "none";
    document.getElementById("signals-table").style.display = "table";

    renderTable();
    startCountdown();

  } catch(e) {
    document.getElementById("spinner").style.display = "none";
    const el = document.getElementById("error-msg");
    el.textContent = `Fout bij laden: ${e.message}`;
    el.style.display = "block";
    startCountdown();
  }
}

loadData();
</script>
