server {
    listen 80;
    server_name _;
    return 301 https://$host:3443$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index login.html;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Statische bestanden: serveer direct
    location ~* \.(html|css|js|ico|png|svg|woff|woff2|ttf|map)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        expires 0;
    }

    # Statische root (login.html als index)
    location = / {
        try_files /login.html =404;
    }

    # API proxy — alles wat geen statisch bestand is gaat naar control_api
    # Voorkomt mixed-content blokkering (HTTPS dashboard → HTTP backend)
    location / {
        try_files $uri @api;
    }

    location @api {
        proxy_pass         http://control_api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
