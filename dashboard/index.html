<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Apex + OpenClaw Dashboard</title>
<script src="i18n.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, Arial, sans-serif; background: #0d1117; color: #e6edf3; }
  header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d;
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.3rem; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #3fb950; margin-left: auto; }
  #last-update { font-size: 0.75rem; color: #8b949e; }
  #logout-btn { font-size: 0.75rem; color: #8b949e; background: none; border: 1px solid #30363d;
                border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-left: 8px; }
  #logout-btn:hover { color: #f85149; border-color: #f85149; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
          gap: 16px; padding: 20px 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 18px; }
  .card h2 { font-size: 0.85rem; color: #8b949e; text-transform: uppercase;
             letter-spacing: .05em; margin-bottom: 12px; }
  .coin-row { display: flex; justify-content: space-between; align-items: center;
              padding: 8px 0; border-bottom: 1px solid #21262d; }
  .coin-row:last-child { border: none; }
  .coin-sym { font-weight: 600; font-size: 0.95rem; }
  .coin-price { font-size: 0.9rem; color: #c9d1d9; }
  .chg-pos { color: #3fb950; font-size: 0.8rem; }
  .chg-neg { color: #f85149; font-size: 0.8rem; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 2px 8px;
           border-radius: 20px; font-weight: 700; margin-left: 6px; }
  .badge-buy  { background: #1a4731; color: #3fb950; }
  .badge-sell { background: #4a1f1f; color: #f85149; }
  .badge-hold { background: #21262d; color: #8b949e; }
  .metric { display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid #21262d; font-size: 0.85rem; }
  .metric:last-child { border: none; }
  .metric-val { color: #c9d1d9; font-weight: 600; }
  .flash-row { padding: 6px 0; font-size: 0.82rem; color: #f0883e; border-bottom: 1px solid #21262d; }
  .flash-row:last-child { border: none; }
  .agent-block { background: #0d1117; border-radius: 8px; padding: 12px;
                 font-size: 0.8rem; color: #c9d1d9; margin-top: 8px; line-height: 1.5; }
  .verdict-go  { color: #3fb950; font-weight: 700; }
  .verdict-nogo{ color: #f85149; font-weight: 700; }
  #error-msg { padding: 20px 24px; color: #f85149; }
  .spinner { border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%;
             width: 32px; height: 32px; animation: spin .8s linear infinite;
             margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hist-btn { background: #1f4068; color: #58a6ff; border: 1px solid #1158a7;
              border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 0.82rem;
              font-weight: 600; transition: background .2s; }
  .hist-btn:hover { background: #1a3557; }
  .hist-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
  .stat-box { background: #0d1117; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-val { font-size: 1.3rem; font-weight: 700; }
  .stat-lbl { font-size: 0.7rem; color: #8b949e; margin-top: 2px; }
  .sig-tag { display: inline-block; font-size: 0.7rem; padding: 2px 6px;
             border-radius: 4px; margin-right: 3px; background: #21262d; color: #c9d1d9; }
  .sig-filter-btn { background: #21262d; color: #8b949e; border: 1px solid #30363d;
                    border-radius: 6px; padding: 5px 11px; cursor: pointer; font-size: 0.78rem;
                    transition: all .15s; }
  .sig-filter-btn:hover { background: #2d333b; color: #c9d1d9; }
  .sig-filter-btn.active { background: #1f4068; color: #58a6ff; border-color: #1158a7; font-weight: 600; }

  /* ── Live ticker balk ── */
  #live-ticker {
    display: flex; gap: 0; overflow-x: auto; padding: 0 24px;
    background: #0d1117; border-bottom: 1px solid #21262d;
    scrollbar-width: none;
  }
  #live-ticker::-webkit-scrollbar { display: none; }
  .tick-item {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 18px; min-width: 110px; border-right: 1px solid #21262d;
    transition: background .3s;
  }
  .tick-item:last-child { border-right: none; }
  .tick-sym  { font-size: .7rem; color: #8b949e; font-weight: 600; letter-spacing: .04em; }
  .tick-price{ font-size: 1rem; font-weight: 700; color: #e6edf3; font-variant-numeric: tabular-nums; }
  .tick-chg  { font-size: .72rem; font-weight: 600; }
  .tick-flash-up   { background: #0d2b1a !important; }
  .tick-flash-down { background: #2b0d0d !important; }

  /* ── Pre-crash score balk ── */
  .crash-bar { height: 3px; border-radius: 2px; margin-top: 4px; transition: width .5s; }
  .crash-score-label { font-size: .65rem; color: #8b949e; }

  /* ── Exchange vergelijking tabel ── */
  .exch-table { width: 100%; border-collapse: collapse; font-size: .82rem; margin-top: 8px; }
  .exch-table th { color: #8b949e; font-weight: 600; text-align: right; padding: 4px 8px;
                   border-bottom: 1px solid #30363d; font-size: .72rem; }
  .exch-table th:first-child { text-align: left; }
  .exch-table td { padding: 7px 8px; border-bottom: 1px solid #21262d; text-align: right;
                   font-variant-numeric: tabular-nums; }
  .exch-table td:first-child { text-align: left; font-weight: 600; }
  .exch-table tr:last-child td { border-bottom: none; }
  .exch-consensus { background: #0d1117; border-radius: 6px; padding: 8px 12px; margin-top: 10px;
                    font-size: .82rem; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
  .exch-sym-btn { background: #21262d; color: #8b949e; border: 1px solid #30363d;
                  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: .75rem;
                  transition: all .15s; }
  .exch-sym-btn:hover { background: #2d333b; color: #c9d1d9; }
  .exch-sym-btn.active { background: #1f4068; color: #58a6ff; border-color: #1158a7; font-weight: 600; }
</style>
</head>
<body>
<header>
  <span>🤖</span>
  <h1>OpenClaw Apex — Live Dashboard</h1>
  <span id="status-dot"></span>
  <span id="last-update"></span>
  <a id="ix-nav-live" href="live_signals.html" style="font-size:.78rem;color:#9ecca4;text-decoration:none;border:1px solid #30363d;border-radius:6px;padding:4px 10px;margin-left:8px;white-space:nowrap"></a>
  <a id="ix-nav-setup" href="setup_intelligence.html" style="font-size:.78rem;color:#58a6ff;text-decoration:none;border:1px solid #30363d;border-radius:6px;padding:4px 10px;margin-left:4px;white-space:nowrap"></a>
  <a id="ix-nav-bot" href="bot_positions.html" style="font-size:.78rem;color:#3fb950;text-decoration:none;border:1px solid #30363d;border-radius:6px;padding:4px 10px;margin-left:4px;white-space:nowrap"></a>
  <a id="ix-nav-quality" href="sterk_quality.html" style="font-size:.78rem;color:#d29922;text-decoration:none;border:1px solid #30363d;border-radius:6px;padding:4px 10px;margin-left:4px;white-space:nowrap"></a>
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="nl" onclick="setLang('nl')">NL</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
  <button id="logout-btn" onclick="logout()"></button>
</header>

<div id="live-ticker">
  <div class="tick-item" id="tick-BTCUSDT"><div class="tick-sym">BTC</div><div class="tick-price">—</div><div class="tick-chg" style="color:#8b949e">—</div></div>
  <div class="tick-item" id="tick-ETHUSDT"><div class="tick-sym">ETH</div><div class="tick-price">—</div><div class="tick-chg" style="color:#8b949e">—</div></div>
  <div class="tick-item" id="tick-SOLUSDT"><div class="tick-sym">SOL</div><div class="tick-price">—</div><div class="tick-chg" style="color:#8b949e">—</div></div>
  <div class="tick-item" id="tick-BNBUSDT"><div class="tick-sym">BNB</div><div class="tick-price">—</div><div class="tick-chg" style="color:#8b949e">—</div></div>
  <div class="tick-item" id="tick-XRPUSDT"><div class="tick-sym">XRP</div><div class="tick-price">—</div><div class="tick-chg" style="color:#8b949e">—</div></div>
  <div class="tick-item" id="tick-BNBUSDT2" style="display:none"></div>
  <div class="tick-item" style="min-width:auto;padding:8px 14px;flex-direction:row;align-items:center;gap:8px;margin-left:auto;border-right:none">
    <div id="cascade-badge" style="display:none;background:#4a1f1f;color:#f85149;border-radius:4px;font-size:.68rem;font-weight:700;padding:3px 8px">⚡ BTC CASCADE</div>
    <div style="font-size:.68rem;color:#8b949e" id="ticker-ts">Binance live</div>
  </div>
</div>
<div id="app"><div class="spinner"></div></div>

<script>
const API = ``; // relatief pad — nginx proxyt /auth/ en /api/ naar control_api:8080

// Sessie check
(function() {
  const token = localStorage.getItem("oc_token");
  const exp   = localStorage.getItem("oc_expires");
  if (!token || !exp || new Date(exp) <= new Date()) {
    localStorage.removeItem("oc_token");
    window.location.href = "login.html";
  }
})();

const TOKEN = localStorage.getItem("oc_token") || "changeme-strong-token";
const H = {"X-API-KEY": TOKEN};

async function fetchJSON(url) {
  const r = await fetch(url, {headers: H});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function badge(signal) {
  const map = {
    BUY:"badge-buy", SELL:"badge-sell", HOLD:"badge-hold",
    PERFECT_DAY:"badge-buy", BREAKOUT_BULL:"badge-buy", MOMENTUM:"badge-buy",
    DANGER:"badge-sell"
  };
  const cls = map[signal] || "badge-hold";
  const lbl = signal === "PERFECT_DAY" ? "⭐ PERFECT DAY" : (signal || "HOLD");
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function chgClass(v) { return v >= 0 ? "chg-pos" : "chg-neg"; }
function fmt(v, d=4) { return v == null ? "—" : (+v).toFixed(d); }

function crashColor(score) {
  if (score == null) return "#8b949e";
  if (score >= 80) return "#f85149";
  if (score >= 60) return "#f0883e";
  if (score >= 40) return "#d29922";
  return "#3fb950";
}

function renderCoins(coins) {
  if (!coins || !coins.length) return `<p style='color:#8b949e;font-size:.85rem'>${t("ix_no_coins")}</p>`;
  return coins.map(c => {
    const crash = c.pre_crash_score ?? null;
    const crashBar = crash != null ? `
      <div style="margin-top:4px;display:flex;align-items:center;gap:5px">
        <div style="flex:1;background:#21262d;border-radius:2px;height:3px;overflow:hidden">
          <div style="width:${Math.min(100,crash)}%;height:3px;background:${crashColor(crash)};transition:width .5s"></div>
        </div>
        <span class="crash-score-label" style="color:${crashColor(crash)}">crash ${crash.toFixed(0)}</span>
      </div>` : "";
    const cbLead = c.coinbase_lead ? `<span style="font-size:.65rem;background:#1f2d4a;color:#58a6ff;border-radius:3px;padding:1px 5px;margin-left:4px">CB⬆</span>` : "";
    const cascade = c.cascade_active ? `<span style="font-size:.65rem;background:#4a1f1f;color:#f85149;border-radius:3px;padding:1px 5px;margin-left:4px">CASCADE</span>` : "";
    const priceDecimals = (c.price || 0) >= 100 ? 2 : (c.price || 0) >= 1 ? 4 : 6;
    const consensusLine = c.price_consensus && Math.abs(c.price_consensus - c.price) > 0.001
      ? `<div style="font-size:.68rem;color:#8b949e">Consensus: $${fmt(c.price_consensus, priceDecimals)}</div>` : "";
    return `
    <div class="coin-row">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
          <span class="coin-sym">${c.symbol.replace("USDT","")}</span>
          ${badge(c.signal)}${cbLead}${cascade}
        </div>
        <div style="font-size:.75rem;color:#8b949e;margin-top:2px">
          RSI: ${fmt(c.rsi,1)} &nbsp;|&nbsp; TF: ${c.tf_bias||"—"} &nbsp;|&nbsp; ATR: ${fmt(c.atr,4)}
        </div>
        ${c.kimi_reden ? `<div style="font-size:.72rem;color:#58a6ff;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px">💡 ${c.kimi_reden}</div>` : ""}
        ${crashBar}
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px">
        <div class="coin-price" style="font-size:1rem;font-weight:700">$${(+(c.price||0)).toLocaleString("en-US",{minimumFractionDigits:priceDecimals,maximumFractionDigits:priceDecimals})}</div>
        <div class="${chgClass(c.change_pct)}">${(c.change_pct||0)>=0?"+":""}${fmt(c.change_pct,2)}%</div>
        ${consensusLine}
        <div style="font-size:.72rem;color:#8b949e">Vol: ${((c.volume_usdt||0)/1e6).toFixed(0)}M</div>
      </div>
    </div>`;
  }).join("");
}

function renderFlash(triggers) {
  if (!triggers || !triggers.length) return `<p style='color:#8b949e;font-size:.82rem'>${t("ix_no_flash")}</p>`;
  return triggers.map(tr =>
    `<div class="flash-row">⚡ ${tr.symbol} — ${t("ix_flash_drop")} ${tr.drop_pct}% | ${t("ix_flash_price")} $${fmt(tr.price,4)}</div>`
  ).join("");
}

function renderAgent(agent) {
  if (!agent || !agent.verdict) return `<p style='color:#8b949e;font-size:.82rem'>${t("ix_agent_not_run")}</p>`;
  const v = agent.verdict;
  const s = agent.strategy || {};
  const r = agent.risk || {};
  const beslissing = v.beslissing || "?";
  const cls = beslissing === "GO" ? "verdict-go" : "verdict-nogo";
  return `
    <div class="agent-block">
      <div>${t("ix_decision")} <span class="${cls}">${beslissing}</span>
        ${v.vertrouwen_pct ? `<span style="color:#8b949e">(${v.vertrouwen_pct}${t("ix_confidence")})</span>` : ""}
      </div>
      ${v.samenvatting ? `<div style="margin-top:6px">${v.samenvatting}</div>` : ""}
      ${s.strategy ? `<div style="margin-top:6px;color:#58a6ff">${t("ix_strategy_lbl")} ${s.strategy}</div>` : ""}
      ${r.reden ? `<div style="margin-top:4px;color:#8b949e">${t("ix_risk_lbl")} ${r.reden}</div>` : ""}
    </div>`;
}

function pnlColor(v) {
  if (v == null) return "#8b949e";
  return v >= 0 ? "#3fb950" : "#f85149";
}
function pnlFmt(v) {
  if (v == null) return `<span style='color:#8b949e'>${t("ix_waiting")}</span>`;
  const sign = v >= 0 ? "+" : "";
  return `<span style='color:${pnlColor(v)};font-weight:600'>${sign}${v.toFixed(2)}%</span>`;
}

function renderPerformance(rows) {
  if (!rows || !rows.length) return `<p style='color:#8b949e;font-size:.82rem'>${t("ix_no_perf")}</p>`;

  const closed = rows.filter(r => r.pnl_1h_pct != null);
  const wins   = closed.filter(r => r.pnl_1h_pct > 0).length;
  const winRate = closed.length ? Math.round(wins / closed.length * 100) : null;
  const avgPnl  = closed.length ? (closed.reduce((s,r) => s + r.pnl_1h_pct, 0) / closed.length).toFixed(2) : null;

  let html = "";
  if (closed.length > 0) {
    html += `<div style="display:flex;gap:16px;margin-bottom:12px;padding:10px;background:#0d1117;border-radius:8px">
      <div style="text-align:center">
        <div style="font-size:1.3rem;font-weight:700;color:${winRate>=50?'#3fb950':'#f85149'}">${winRate}%</div>
        <div style="font-size:0.7rem;color:#8b949e">${t("ix_winrate_1h")}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:1.3rem;font-weight:700;color:${avgPnl>=0?'#3fb950':'#f85149'}">${avgPnl>=0?'+':''}${avgPnl}%</div>
        <div style="font-size:0.7rem;color:#8b949e">${t("ix_avg_pnl_1h")}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:1.3rem;font-weight:700;color:#c9d1d9">${closed.length}</div>
        <div style="font-size:0.7rem;color:#8b949e">${t("ix_evaluated")}</div>
      </div>
    </div>`;
  }

  html += rows.slice(0, 15).map(r => {
    const time = r.ts ? r.ts.slice(11,19) : "";
    const date = r.ts ? r.ts.slice(0,10) : "";
    const sigs = (r.active_signals || []).join(", ") || r.signal;
    return `<div style="padding:7px 0;border-bottom:1px solid #21262d;font-size:0.78rem">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-weight:600">${r.symbol}</span>
          <span style="color:#8b949e;margin-left:6px">${sigs}</span>
          <span style="color:#58a6ff;font-size:.7rem;margin-left:6px">@ $${(+r.entry_price).toFixed(4)}</span>
        </div>
        <span style="color:#8b949e;font-size:.7rem">${date} ${time}</span>
      </div>
      <div style="display:flex;gap:12px;margin-top:3px">
        <span style="color:#8b949e">${t("ix_perf_15m")} ${pnlFmt(r.pnl_15m_pct)}</span>
        <span style="color:#8b949e">${t("ix_perf_1h")} ${pnlFmt(r.pnl_1h_pct)}</span>
        <span style="color:#8b949e">${t("ix_perf_4h")} ${pnlFmt(r.pnl_4h_pct)}</span>
        ${r.status === 'open' ? '<span style="color:#f0883e;font-size:.7rem">⏳ open</span>' : ''}
      </div>
    </div>`;
  }).join("");
  return html;
}

function renderBalance(b) {
  if (!b) return `<p style='color:#8b949e;font-size:.82rem'>${t("ix_balance_na")}</p>`;
  const bal      = b.balance || 1000;
  const start    = b.demo_start_usdt || 1000;
  const pnl      = b.pnl_total_usdt ?? (bal - start);
  const pnlPct   = b.pnl_total_pct   ?? ((bal - start) / start * 100);
  const peak     = b.peak_balance || bal;
  const pnlClr   = pnl >= 0 ? "#3fb950" : "#f85149";
  const winClr   = (b.win_rate_pct||0) >= 50 ? "#3fb950" : "#f85149";
  const balPct   = Math.min(100, (bal / Math.max(peak, start)) * 100);

  return `
  <div style='display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:16px;
              padding:16px;background:#0d1117;border-radius:10px;border:1px solid #30363d'>
    <div>
      <div style='font-size:.72rem;color:#8b949e;margin-bottom:4px'>${t("ix_current_balance")}</div>
      <div style='font-size:2rem;font-weight:800;color:#e6edf3;line-height:1'>
        $${bal.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
      </div>
      <div style='font-size:.8rem;margin-top:4px;color:${pnlClr};font-weight:600'>
        ${pnl>=0?"+":""}$${pnl.toFixed(2)} (${pnlPct>=0?"+":""}${pnlPct.toFixed(2)}%) ${t("ix_vs")} $${start.toLocaleString()}
      </div>
      <div style='margin-top:8px;background:#21262d;border-radius:4px;height:6px;width:200px'>
        <div style='width:${balPct}%;height:6px;border-radius:4px;background:${pnlClr};transition:width .6s'></div>
      </div>
    </div>
    <div style='margin-left:auto;display:flex;gap:16px;flex-wrap:wrap'>
      <div style='text-align:center'>
        <div style='font-size:1.4rem;font-weight:700;color:${winClr}'>${b.win_rate_pct??0}%</div>
        <div style='font-size:.68rem;color:#8b949e'>${t("col_winrate")}</div>
      </div>
      <div style='text-align:center'>
        <div style='font-size:1.4rem;font-weight:700;color:#c9d1d9'>${b.total_orders??0}</div>
        <div style='font-size:.68rem;color:#8b949e'>${t("ix_orders")}</div>
      </div>
      <div style='text-align:center'>
        <div style='font-size:1.4rem;font-weight:700;color:#58a6ff'>$${peak.toFixed(0)}</div>
        <div style='font-size:.68rem;color:#8b949e'>${t("ix_peak_balance")}</div>
      </div>
    </div>
  </div>
  <div style='display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px'>
    <div style='background:#0d1117;border-radius:8px;padding:8px 14px;text-align:center'>
      <div style='font-size:1rem;font-weight:700;color:${(b.avg_pnl_1h_pct||0)>=0?"#3fb950":"#f85149"}'>${(b.avg_pnl_1h_pct||0)>=0?"+":""}${(b.avg_pnl_1h_pct||0).toFixed(3)}%</div>
      <div style='font-size:.68rem;color:#8b949e'>${t("ix_avg_pnl_1h_label")}</div>
    </div>

async function runHistBacktest(symbol) {

  const periodLabel = histMonths === 0 ? t("ix_hist_max") : t("ix_hist_months").replace("{n}", histMonths);
  res.innerHTML = `<div style='display:flex;align-items:center;gap:10px;color:#58a6ff;font-size:.85rem'>
    <div class='spinner' style='width:20px;height:20px;margin:0'></div>
    ${t("ix_analyzing").replace("{sym}", symbol).replace("{period}", periodLabel)}
  </div>`;
  document.querySelectorAll(".hist-btn").forEach(b => b.disabled = true);

  try {
    const data = await fetchJSON(`${API}/backtest/historical/${symbol}?interval=1h&months=${histMonths}`);

    res.innerHTML = `<p style='color:#f85149'>⚠️ ${t("error")}: ${e.message}</p>`;

    histRunning = false;

    <thead>

    html += `<tr style='border-bottom:1px solid #21262d${isHighlighted ? ";background:#1a2d1a" : ""}'>

  res.innerHTML = html;

// ── Live Prijs Ticker (rechtstreeks Binance, elke 3 sec) ──────────────────
const TICKER_SYMS = ["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT"];
const _prevPrices = {};

async function updateLiveTicker() {
  try {
    const symsJson = encodeURIComponent(JSON.stringify(TICKER_SYMS));
    const r = await fetch(
      `https://api.binance.com/api/v3/ticker/24hr?symbols=${symsJson}`,
      { cache: "no-store" }
    );
    if (!r.ok) return;
    const data = await r.json();
    const now = new Date().toLocaleTimeString();
    document.getElementById("ticker-ts").textContent = `Binance · ${now}`;

    for (const t of data) {
      const sym   = t.symbol;
      const price = parseFloat(t.lastPrice);
      const chg   = parseFloat(t.priceChangePercent);
      const el    = document.getElementById(`tick-${sym}`);
      if (!el) continue;

      const priceEl = el.children[1];
      const chgEl   = el.children[2];

      // Flash animatie bij verandering
      const prev = _prevPrices[sym];
      if (prev !== undefined && price !== prev) {
        const cls = price > prev ? "tick-flash-up" : "tick-flash-down";
        el.classList.add(cls);
        setTimeout(() => el.classList.remove(cls), 600);
      }
      _prevPrices[sym] = price;

      // Prijs formatteren
      const decimals = price >= 1000 ? 2 : price >= 1 ? 4 : 6;
      priceEl.textContent = `$${price.toLocaleString("en-US", {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}`;
      chgEl.style.color = chg >= 0 ? "#3fb950" : "#f85149";
      chgEl.textContent = `${chg >= 0 ? "+" : ""}${chg.toFixed(2)}%`;
    }
  } catch(e) {
    // Binance tijdelijk onbereikbaar — stil falen
  }
}

function startLiveTicker() {
  updateLiveTicker();
  setInterval(updateLiveTicker, 3000);
}

// Voeg extra gevolgde coins toe aan de ticker als ze niet al erin zitten
function extendTicker(coins) {
  const ticker = document.getElementById("live-ticker");
  const badgeEl = document.getElementById("cascade-badge");
  if (!ticker) return;
  for (const coin of (coins || [])) {
    const sym = coin.symbol;
    if (TICKER_SYMS.includes(sym)) continue;  // al aanwezig
    if (document.getElementById(`tick-${sym}`)) continue;
    const base = sym.replace("USDT","");
    const div = document.createElement("div");
    div.className = "tick-item";
    div.id = `tick-${sym}`;
    div.innerHTML = `<div class="tick-sym">${base}</div><div class="tick-price">—</div><div class="tick-chg" style="color:#8b949e">—</div>`;
    ticker.insertBefore(div, ticker.lastElementChild);
    if (!TICKER_SYMS.includes(sym)) TICKER_SYMS.push(sym);
  }
}

// ── Multi-Exchange Vergelijking (via backend proxy — geen CORS issues) ─────
const EXCH_WEIGHTS = { coinbase:0.35, binance:0.25, bybit:0.20, okx:0.12, kraken:0.08 };
const EXCH_ORDER   = ["coinbase","binance","bybit","okx","kraken","blofin"];
const EXCH_LABELS  = {
  coinbase:"Coinbase ⭐", binance:"Binance", bybit:"Bybit",
  okx:"OKX", kraken:"Kraken", blofin:"BloFin 🏠"
};
let _exchSym      = "XRPUSDT";
let _exchPrices   = {};
let _exchConsensus = null;
let _exchInterval = null;

async function fetchAllExchangePrices(sym) {
  // Backend proxy: control_api haalt alles op — BloFin, Coinbase, etc. zonder CORS
  const r = await fetch(`${API}/market/prices/${sym}`, {headers: H, cache:"no-store"});
  if (!r.ok) throw new Error(`prices ${r.status}`);
  return await r.json();  // { symbol, prices:{...}, consensus, ts }
}

function calcExchConsensus(prices) {
  let wSum = 0, wTotal = 0;
  for (const [ex, w] of Object.entries(EXCH_WEIGHTS)) {
    if (prices[ex] != null) { wSum += prices[ex] * w; wTotal += w; }
  }
  return wTotal > 0 ? wSum / wTotal : null;
}

function renderExchangeCard() {
  const el = document.getElementById("exch-card-body");
  if (!el) return;
  const prices    = _exchPrices;           // { coinbase:1.23, binance:..., blofin:... }
  const consensus = _exchConsensus;        // van backend (gewogen) of lokaal berekend
  const base = _exchSym.replace("USDT","");
  const dec = (consensus||0) >= 1000 ? 2 : (consensus||0) >= 1 ? 4 : 6;
  const onlineCount = EXCH_ORDER.filter(k => prices[k] != null).length;

  if (!onlineCount) {
    el.innerHTML = `<p style='color:#8b949e;font-size:.82rem'>${t("ix_loading_prices")}</p>`;
    return;
  }

  const rows = EXCH_ORDER.map(ex => {
    const p = prices[ex];
    if (p == null) return `
      <tr><td style="color:#8b949e">${EXCH_LABELS[ex]}</td>
          <td colspan="2" style="color:#8b949e;text-align:center">${t("ix_offline")}</td></tr>`;
    const diff = consensus ? (p - consensus) / consensus * 100 : 0;
    const diffClr = Math.abs(diff) < 0.05 ? "#8b949e" : diff > 0 ? "#3fb950" : "#f85149";
    const diffStr = `${diff >= 0 ? "+" : ""}${diff.toFixed(3)}%`;
    const rowStyle = ex==="coinbase" ? " style='background:#0d1a2b'"
                   : ex==="blofin"   ? " style='background:#0a1a0a'" : "";
    const nameStyle = ex==="coinbase" ? "color:#58a6ff" : ex==="blofin" ? "color:#3fb950" : "";
    return `<tr${rowStyle}>
      <td style="${nameStyle}">${EXCH_LABELS[ex]}</td>
      <td>$${p.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec})}</td>
      <td style="color:${diffClr};font-size:.78rem">${diffStr}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <div style="font-size:.72rem;color:#8b949e;margin-bottom:8px">
      ${t("ix_exch_desc").replace("{base}", base)}
    </div>
    <table class="exch-table">
      <thead><tr><th>Exchange</th><th>${t("ix_exch_price")}</th><th>${t("ix_exch_vs_consensus")}</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${consensus != null ? `<div class="exch-consensus">
      <span style="color:#8b949e">${t("ix_exch_weighted")}</span>
      <span style="font-weight:700;color:#e6edf3;font-size:1rem">
        $${consensus.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec})}
      </span>
      <span style="color:#8b949e;font-size:.72rem">${t("ix_exch_online").replace("{n}", onlineCount)}</span>
      <span style="color:#8b949e;font-size:.68rem;margin-left:auto">
        ${new Date().toLocaleTimeString()}
      </span>
    </div>` : ""}`;
}

async function updateExchangeCard() {
  try {
    const d = await fetchAllExchangePrices(_exchSym);
    _exchPrices   = d.prices || {};
    _exchConsensus = d.consensus || calcExchConsensus(_exchPrices);
    renderExchangeCard();
  } catch(e) {
    const el = document.getElementById("exch-card-body");
    if (el) el.innerHTML = `<p style='color:#f85149;font-size:.8rem'>⚠️ ${t("error")}: ${e.message}</p>`;
  }
}

function connectSSE() {
  if (_sseSource) { _sseSource.close(); _sseSource = null; }
  clearTimeout(_sseRetry);
  const url = `${API}/stream?token=${encodeURIComponent(TOKEN)}`;
  const src  = new EventSource(url);
  let lastTs = null;

  src.addEventListener("state", async (e) => {
    try {
      const state = JSON.parse(e.data);
      if (state.ts !== lastTs) {
        lastTs = state.ts;
        await renderFromState(state);
      }
    } catch(err) { console.error("[SSE] parse fout:", err); }
  });

  src.onerror = () => {
    document.getElementById("status-dot").style.background = "#f85149";
    src.close(); _sseSource = null;
    _sseRetry = setTimeout(connectSSE, 5000);
    console.log("[SSE] Verbinding verbroken, herverbinden na 5s...");
  };

  _sseSource = src;
  console.log("[SSE] Verbonden met", url);
}
