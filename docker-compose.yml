services:
  apex_engine:
    build: ./apex_engine
    env_file:
      - ./secrets/apex.env
    networks:
      - trade_net
    volumes:
      - apex_data:/var/apex
    restart: unless-stopped

  control_api:
    build: ./control_api
    env_file:
      - ./secrets/control_api.env
    networks:
      - trade_net
      - agent_net
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - apex_data:/var/apex
    restart: unless-stopped

  openclaw:
    build: ./openclaw
    env_file:
      - ./secrets/openclaw.env
    networks:
      - agent_net
    volumes:
      - openclaw_workspace:/workspace
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    networks:
      - agent_net
    ports:
      - "0.0.0.0:3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  openclaw_runtime:
    build:
      context: .
      dockerfile: ./openclaw_runtime/Dockerfile
    env_file:
      - ./secrets/openclaw.env
    networks:
      - agent_net
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - apex_data:/var/apex
    restart: unless-stopped
    depends_on:
      - control_api

  # ── OpenClaw Gateway (Operator OS) ──────────────────────────────────────────
  # Echte openclaw/openclaw TypeScript gateway. Telegram-only, localhost-bound.
  # Config: ./openclaw_config/openclaw.json → /root/.openclaw/
  # Skills: ./skills/ → /workspace/skills/
  # Tools:  ./openclaw_tools/scripts/ → /workspace/tools/
  openclaw_gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    env_file:
      - ./secrets/openclaw_gateway.env
    volumes:
      - ./openclaw_config:/root/.openclaw
      - ./skills:/workspace/skills:ro
      - ./openclaw_tools/scripts:/workspace/tools:ro
      - apex_data:/var/apex
    networks:
      - agent_net
    ports:
      - "127.0.0.1:18789:18789"
    healthcheck:
      # /health kan een HTML 200 teruggeven (bekende bug).
      # Check dat de response JSON bevat met "status" key.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:18789/health 2>/dev/null | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      - control_api

  # ── Market Oracle Sandbox ────────────────────────────────────────────────────
  # Geïsoleerde container: GEEN exchange keys, GEEN AI keys.
  # Alleen publieke RSS + Yahoo Finance. Resource-limited.
  market_oracle_sandbox:
    build:
      context: .
      dockerfile: market_oracle_sandbox/Dockerfile
    volumes:
      - ./skills/market_oracle/tools:/workspace/tools:ro
    networks:
      - agent_net
    ports:
      - "127.0.0.1:8095:8095"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8095/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Jojo1 Command Center ────────────────────────────────────────────────────
  # Beveiligde webinterface voor AI operator + eigenaar.
  # Eigen auth (Telegram OTP, 8h sessies), audit logging, proxy naar control_api.
  command_center:
    build: ./command_center
    env_file:
      - ./secrets/command_center.env
    volumes:
      - cc_data:/var/command_center
    networks:
      - agent_net
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:4000/cc/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - control_api

  tg_coordinator_bot:
    build:
      context: ./telegram
      dockerfile: coordinator_bot/Dockerfile
    env_file:
      - ./secrets/telegram_coordinator.env
    networks:
      - agent_net
    restart: unless-stopped

  tg_discuss_bot:
    build:
      context: ./telegram
      dockerfile: discuss_bot/Dockerfile
    env_file:
      - ./secrets/telegram_discuss.env
    networks:
      - agent_net
    restart: unless-stopped

networks:
  trade_net:
  agent_net:

volumes:
  apex_data:
  openclaw_workspace:
  cc_data:
